<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link rel="icon" type="image/png" href="https://skoolapp.com/wp-content/uploads/2018/03/website-attandence-features-page.png">

<style>

body{
font-family:Arial;
text-align:center;

/* BACKGROUND IMAGE ADDED */
background:
linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
url("https://box-six.com/images/the_classroom-min.jpeg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

min-height:100vh;
margin:0;
padding:30px;
color:#333;
}

/* HEADER BOX */
h2{
color:white;
background:rgba(255,255,255,0.15);
border:2px solid rgba(255,255,255,0.4);
display:inline-block;
padding:10px 25px;
border-radius:10px;
text-shadow:1px 1px 6px rgba(0,0,0,0.4);
}

/* NAV BUTTONS */
a{
text-decoration:none;
margin:10px;
}

a button{
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

a[href="/logout"] button{
background:linear-gradient(45deg,#ff4b2b,#ff416c);
}

a button:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

/* SECTION TITLES BOX */
h3{
color:white;
margin-top:30px;
background:rgba(255,255,255,0.15);
border:2px solid rgba(255,255,255,0.4);
display:inline-block;
padding:6px 18px;
border-radius:8px;
text-shadow:1px 1px 4px rgba(0,0,0,0.3);
}

/* FORMS */
form{
margin:10px;
}

/* INPUT FIELDS */
input{
padding:8px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
outline:none;
}

input:focus{
border-color:#667eea;
box-shadow:0 0 6px rgba(102,126,234,0.6);
}

/* GENERAL BUTTON */
button{
padding:7px 14px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
transition:0.25s;
}

/* LOAD BUTTON */
form[action="/dashboard"] button{
background:linear-gradient(45deg,#ff9800,#ffb347);
color:white;
}

form[action="/dashboard"] button:hover{
background:#e68900;
}

/* ADD STUDENT BUTTON */
form[action="/add_student"] button{
background:linear-gradient(45deg,#4CAF50,#2ecc71);
color:white;
}

form[action="/add_student"] button:hover{
background:#3e8e41;
}

/* TABLE */
table{
margin:auto;
border-collapse:collapse;
width:70%;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* TABLE HEADERS */
th{
background:linear-gradient(45deg,#333,#555);
color:white;
padding:12px;
}

/* TABLE CELLS */
td{
border:1px solid #ddd;
padding:10px;
}

/* ROW HOVER */
tr:hover{
background:#f3f3f3;
}

/* PRESENT BUTTON */
td form:first-child button{
background:linear-gradient(45deg,#28a745,#2ecc71);
color:white;
}

td form:first-child button:hover{
background:#218838;
}

/* ABSENT BUTTON */
td form:nth-child(2) button{
background:linear-gradient(45deg,#ffc107,#ffdb4d);
color:black;
}

td form:nth-child(2) button:hover{
background:#e0a800;
}

/* DELETE BUTTON */
button[style]{
background:linear-gradient(45deg,#e53935,#ff4b2b) !important;
color:white !important;
}

button[style]:hover{
background:#c62828 !important;
}

</style>
</head>

<body>

<h2>Welcome {{teacher}}</h2>

<a href="/view"><button>View Attendance</button></a>
<a href="/logout"><button>Logout</button></a>

<h3>Select Attendance Date</h3>

<form method="GET" action="/dashboard">
<input type="date" name="date" value="{{selected_date}}">
<button type="submit">Load</button>
</form>

<h3>Add Student</h3>

<form action="/add_student" method="POST">
<input type="text" name="name" placeholder="Student Name">
<input type="text" name="roll_no" placeholder="Roll Number">
<button type="submit">Add</button>
</form>

<h3>Mark Attendance</h3>

<table>

<tr>
<th>Name</th>
<th>Roll No</th>
<th>Present</th>
<th>Absent</th>
<th>Delete</th>
</tr>

{% for s in students %}
<tr>

<td>{{s[1]}}</td>
<td>{{s[2]}}</td>

<td>
<form action="/mark/{{s[0]}}" method="POST">
<input type="hidden" name="status" value="Present">
<input type="hidden" name="date" value="{{selected_date}}">
<button>Present</button>
</form>
</td>

<td>
<form action="/mark/{{s[0]}}" method="POST">
<input type="hidden" name="status" value="Absent">
<input type="hidden" name="date" value="{{selected_date}}">
<button>Absent</button>
</form>
</td>

<td>
<a href="/delete_student/{{s[0]}}">
<button style="background:red;color:white;">Delete</button>
</a>
</td>

</tr>
{% endfor %}

</table>

</body>
</html>
