<!DOCTYPE html>

<html>
<head>

<title>Teacher Register</title>

<link rel="icon" type="image/png" href="https://skoolapp.com/wp-content/uploads/2018/03/website-attandence-features-page.png">

<style>

body{
font-family:Arial;
text-align:center;

/* BACKGROUND IMAGE ADDED */
background:
linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
url("https://upload.wikimedia.org/wikipedia/commons/8/8e/Staples_High_School%2C_Westport%2C_CT.jpg");

background-size:400% 400%, cover;
background-position:center;
background-repeat:no-repeat;

animation:bgmove 10s ease infinite;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
margin:0;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h2{
color:white;
margin-bottom:20px;
letter-spacing:1px;
text-shadow:1px 1px 5px rgba(0,0,0,0.3);
}

form{
background:white;
padding:35px;
width:320px;
margin:auto;
border-radius:12px;
box-shadow:0px 12px 30px rgba(0,0,0,0.25);
transition:transform 0.3s;
}

form:hover{
transform:scale(1.02);
}

label{
display:block;
text-align:left;
margin-left:15px;
font-size:14px;
font-weight:bold;
color:#333;
}

.input-group{
display:flex;
align-items:center;
background:#f8f8f8;
border:1px solid #ccc;
border-radius:6px;
margin:8px;
padding:5px;
}

.icon{
margin-left:8px;
margin-right:5px;
font-size:16px;
}

input{
border:none;
outline:none;
padding:8px;
width:100%;
background:transparent;
}

.input-group:focus-within{
border-color:#4facfe;
box-shadow:0 0 8px rgba(79,172,254,0.6);
}

button{
padding:10px;
background:linear-gradient(45deg,#4facfe,#00c6ff);
color:white;
border:none;
border-radius:6px;
cursor:pointer;
width:95%;
font-weight:bold;
letter-spacing:0.5px;
transition:0.3s;
margin-top:10px;
}

button:hover{
background:linear-gradient(45deg,#3a8bfd,#0099cc);
transform:translateY(-2px);
box-shadow:0 5px 12px rgba(0,0,0,0.3);
}

/* LOGIN BUTTON HIGHLIGHT */
a{
display:inline-block;
margin-top:8px;
padding:10px 20px;
background:linear-gradient(45deg,#ff7e5f,#ff3f34);
border-radius:25px;
color:white;
font-weight:bold;
text-decoration:none;
font-size:14px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

a:hover{
transform:translateY(-2px);
background:linear-gradient(45deg,#ff5f6d,#ff1e56);
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

</style>

</head>

<body>

<h2>Teacher Registration</h2>

<form method="POST">

<label>Name</label>

<div class="input-group">
<span class="icon">👤</span>
<input type="text" name="name" placeholder="Enter your name" required>
</div>

<label>Email</label>

<div class="input-group">
<span class="icon">📧</span>
<input type="email" name="email" placeholder="Enter your email" required>
</div>

<label>Password</label>

<div class="input-group">
<span class="icon">🔒</span>
<input type="password" name="password" placeholder="Enter password" required>
</div>

<button type="submit">Register</button>

</form>

<a href="/login">Login</a>

</body>
</html>
